<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TRACER</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0e1a2b" />
<meta name="description" content="Project command center — tasks, assignees, progress." />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="TRACER" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1a2b;
    --bg-elev: #142539;
    --bg-elev-2: #1b2e46;
    --line: #243a55;
    --line-soft: #1c2d44;
    --ink: #f3ede0;
    --ink-soft: #a8b3c4;
    --ink-faint: #6a7891;
    --accent: #d4a24c;
    --accent-soft: rgba(212, 162, 76, 0.15);
    --ok: #6cbf8e;
    --warn: #e8a44a;
    --crit: #d97766;
    --crit-soft: rgba(217, 119, 102, 0.18);
    --warn-soft: rgba(232, 164, 74, 0.18);
    --hold: #9aa5b8;
    --info: #6ab0d4;
    --info-soft: rgba(106, 176, 212, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; min-height: 100vh; padding-top: env(safe-area-inset-top, 0); }

  /* HEADER */
  .header { padding: 1rem 1.25rem 0; border-bottom: 1px solid var(--line-soft); }
  .brand { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.5rem; }
  .brand h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 1.5rem; letter-spacing: 0.08em; }
  .brand h1 span { color: var(--accent); }
  .brand .meta { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--ink-faint); letter-spacing: 0.06em; }

  /* SEARCH */
  .search-wrap { margin: 0 0 0.5rem; }
  .search-wrap input {
    width: 100%; background: var(--bg-elev); border: 1px solid var(--line-soft);
    color: var(--ink); padding: 0.5rem 0.75rem; border-radius: 8px;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; outline: none;
    -webkit-appearance: none;
  }
  .search-wrap input::placeholder { color: var(--ink-faint); }
  .search-wrap input:focus { border-color: var(--accent); }

  /* TABS */
  .tabs { display: flex; margin: 0 -1.25rem; padding: 0 1.25rem; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: none; border: none; color: var(--ink-faint);
    padding: 0.6rem 0.9rem 0.8rem; font-family: 'Inter', sans-serif;
    font-size: 0.76rem; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; position: relative; white-space: nowrap; transition: color 0.2s;
  }
  .tab.active { color: var(--ink); }
  .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0.4rem; right: 0.4rem; height: 2px; background: var(--accent); }

  /* MAIN */
  main { flex: 1; overflow-y: auto; padding: 1rem 1.25rem calc(env(safe-area-inset-bottom, 0) + 6rem); }
  .view { display: none; animation: fade 0.25s ease; }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

  /* KPIs */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; margin-bottom: 1.25rem; }
  .kpi { background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: 10px; padding: 0.85rem 0.95rem; }
  .kpi .label { font-size: 0.62rem; color: var(--ink-faint); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.35rem; }
  .kpi .value { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 400; line-height: 1; }
  .kpi .value.crit { color: var(--crit); }
  .kpi .value.warn { color: var(--warn); }
  .kpi .value.ok { color: var(--ok); }
  .kpi .delta { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; color: var(--ink-faint); margin-top: 0.3rem; }

  .section-title { font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin: 1.4rem 0 0.6rem; display: flex; justify-content: space-between; align-items: center; }

  /* Dashboard project list */
  .project-health { background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: 10px; overflow: hidden; }
  .ph-row { display: flex; align-items: center; padding: 0.7rem 0.95rem; border-bottom: 1px solid var(--line-soft); cursor: pointer; transition: background 0.15s; }
  .ph-row:last-child { border-bottom: none; }
  .ph-row:active { background: var(--bg-elev-2); }
  .ph-name { flex: 1; font-size: 0.85rem; font-weight: 500; color: var(--ink); margin-right: 0.5rem; }
  .ph-bar { width: 56px; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; margin-right: 0.7rem; }
  .ph-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  .ph-count { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--ink-soft); min-width: 50px; text-align: right; }
  .ph-count .overdue { color: var(--crit); font-weight: 500; }

  /* Project selector chips */
  .project-selector { display: flex; gap: 0.4rem; overflow-x: auto; margin: 0 -1.25rem 0.9rem; padding: 0 1.25rem 0.25rem; scrollbar-width: none; }
  .project-selector::-webkit-scrollbar { display: none; }
  .chip { background: var(--bg-elev); border: 1px solid var(--line); color: var(--ink-soft); padding: 0.38rem 0.8rem; border-radius: 999px; font-size: 0.75rem; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all 0.15s; }
  .chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .chip.chip-add { border-style: dashed; color: var(--ink-faint); }
  .chip.chip-add:hover, .chip.chip-add:active { color: var(--accent); border-color: var(--accent); }
  .project-edit-link { background: none; border: none; color: var(--ink-faint); font-size: 0.7rem; cursor: pointer; padding: 0.2rem 0.4rem; text-decoration: underline; font-family: 'Inter', sans-serif; }
  .project-edit-link:hover { color: var(--accent); }
  .chip .num { opacity: 0.6; margin-left: 0.3rem; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; }

  .filters { display: flex; gap: 0.5rem; margin-bottom: 0.9rem; align-items: center; flex-wrap: wrap; }
  .filters select { background: var(--bg-elev); border: 1px solid var(--line); color: var(--ink-soft); padding: 0.4rem 0.55rem; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 0.74rem; outline: none; -webkit-appearance: none; appearance: none; }

  .project-meta { background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: 10px; padding: 0.85rem 0.6rem; margin-bottom: 0.9rem; display: flex; }
  .pm-stat { flex: 1; text-align: center; padding: 0 0.3rem; border-right: 1px solid var(--line-soft); }
  .pm-stat:last-child { border-right: none; }
  .pm-stat .v { font-family: 'Fraunces', serif; font-size: 1.1rem; color: var(--ink); line-height: 1; }
  .pm-stat .v.crit { color: var(--crit); }
  .pm-stat .v.warn { color: var(--warn); }
  .pm-stat .v.ok { color: var(--ok); }
  .pm-stat .l { font-size: 0.58rem; color: var(--ink-faint); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 0.3rem; }

  /* Section divider for grouping within projects */
  .section-divider { padding: 0.6rem 0 0.4rem; font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin-top: 0.4rem; display: flex; justify-content: space-between; align-items: center; }
  .section-divider:first-child { padding-top: 0.2rem; }
  .section-divider .count { font-family: 'JetBrains Mono', monospace; color: var(--ink-faint); }

  /* TASK CARDS */
  .task-list { display: flex; flex-direction: column; gap: 0.45rem; }
  .task {
    background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: 10px;
    padding: 0.75rem 0.85rem; display: flex; gap: 0.65rem;
    animation: fade 0.22s ease; transition: border-color 0.2s; position: relative;
  }
  .task.overdue { border-left: 3px solid var(--crit); padding-left: calc(0.85rem - 2px); }
  .task.due-soon { border-left: 3px solid var(--warn); padding-left: calc(0.85rem - 2px); }
  .task.blocked { border-left: 3px solid var(--info); padding-left: calc(0.85rem - 2px); }

  .check {
    width: 18px; height: 18px; min-width: 18px; border: 1.5px solid var(--ink-faint);
    border-radius: 50%; cursor: pointer; margin-top: 2px; background: transparent;
    padding: 0; position: relative; transition: all 0.2s; flex-shrink: 0;
  }
  .check:hover, .check:active { border-color: var(--accent); }
  .check.wip { border-color: var(--warn); }
  .check.wip::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--warn); opacity: 0.5; }
  .check.blocked { border-color: var(--info); }
  .check.blocked::after { content: ''; position: absolute; inset: 4px; border-radius: 1px; background: var(--info); }
  .check.done { background: var(--accent); border-color: var(--accent); }
  .check.done::after { content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: solid var(--bg); border-width: 0 1.5px 1.5px 0; transform: rotate(45deg); }

  .task-body { flex: 1; min-width: 0; cursor: pointer; }
  .task-title {
    font-size: 0.88rem; font-weight: 500; color: var(--ink); line-height: 1.35;
    margin-bottom: 0.3rem; word-break: break-word;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .task-title.done { color: var(--ink-faint); text-decoration: line-through; }

  .task-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; font-size: 0.68rem; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; }
  .task-meta .tag { display: inline-flex; align-items: center; gap: 0.25rem; }
  .task-meta .due { color: var(--ink-soft); }
  .task-meta .due.overdue { color: var(--crit); font-weight: 500; }
  .task-meta .due.soon { color: var(--warn); }
  .task-meta .stat-tag { padding: 0.06rem 0.4rem; border-radius: 3px; font-size: 0.62rem; letter-spacing: 0.04em; }
  .task-meta .stat-tag.wip { background: var(--warn-soft); color: var(--warn); }
  .task-meta .stat-tag.blocked { background: var(--info-soft); color: var(--info); }

  .priority-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--hold); display: inline-block; }
  .priority-dot.crit { background: var(--crit); }
  .priority-dot.high { background: var(--warn); }
  .priority-dot.med { background: var(--accent); opacity: 0.7; }
  .priority-dot.low { background: var(--ok); }

  .task-menu-btn { background: none; border: none; color: var(--ink-faint); cursor: pointer; padding: 0.2rem 0.4rem; font-size: 1.1rem; line-height: 1; border-radius: 4px; align-self: flex-start; }
  .task-menu-btn:hover { color: var(--ink); background: var(--bg-elev-2); }

  /* Update note inside task */
  .task-update {
    margin-top: 0.4rem; padding: 0.4rem 0.55rem; background: var(--bg-elev-2);
    border-radius: 6px; font-size: 0.72rem; color: var(--ink-soft); line-height: 1.4;
    border-left: 2px solid var(--accent); opacity: 0.85;
  }
  .task-update .upd-date { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--ink-faint); display: block; margin-bottom: 0.15rem; letter-spacing: 0.04em; }

  /* ASSIGNEE GROUPS */
  .assignee-group { background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: 10px; margin-bottom: 0.55rem; overflow: hidden; }
  .assignee-head { padding: 0.7rem 0.95rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid var(--line-soft); transition: background 0.15s; }
  .assignee-head:active { background: var(--bg-elev-2); }
  .assignee-group.collapsed .assignee-head { border-bottom: none; }
  .assignee-name { font-size: 0.88rem; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 0.5rem; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; flex-shrink: 0; }
  .assignee-counts { display: flex; gap: 0.4rem; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; }
  .badge { background: var(--line); color: var(--ink-soft); padding: 0.12rem 0.42rem; border-radius: 4px; font-size: 0.66rem; }
  .badge.crit { background: var(--crit-soft); color: var(--crit); }
  .badge.warn { background: var(--warn-soft); color: var(--warn); }
  .chevron { color: var(--ink-faint); font-size: 0.65rem; margin-left: 0.25rem; transition: transform 0.2s; }
  .assignee-group.collapsed .chevron { transform: rotate(-90deg); }
  .assignee-body { padding: 0.45rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .assignee-group.collapsed .assignee-body { display: none; }
  .assignee-body .task { background: var(--bg-elev-2); padding: 0.6rem 0.7rem; }

  /* FAB */
  .fab { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0) + 1.25rem); right: 1.25rem; width: 54px; height: 54px; border-radius: 50%; background: var(--accent); color: var(--bg); border: none; font-size: 1.5rem; font-weight: 300; cursor: pointer; box-shadow: 0 8px 24px rgba(212, 162, 76, 0.35), 0 2px 6px rgba(0,0,0,0.3); z-index: 50; display: flex; align-items: center; justify-content: center; line-height: 1; padding-bottom: 3px; transition: transform 0.2s; }
  .fab:active { transform: scale(0.94); }

  /* MODAL */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(5, 10, 18, 0.7); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-backdrop.show { display: flex; animation: fade 0.2s ease; }
  .modal { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 16px 16px 0 0; width: 100%; max-width: 520px; padding: 1.4rem 1.2rem calc(env(safe-area-inset-bottom, 0) + 1.4rem); max-height: 92vh; overflow-y: auto; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @media (min-width: 640px) { .modal-backdrop { align-items: center; } .modal { border-radius: 16px; max-width: 500px; } }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .modal-head h2 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 1.2rem; }
  .modal-close { background: none; border: none; color: var(--ink-faint); font-size: 1.4rem; cursor: pointer; padding: 0.25rem 0.5rem; line-height: 1; }
  .field { margin-bottom: 0.85rem; }
  .field label { display: block; font-size: 0.64rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.3rem; }
  .field input[type="text"], .field input[type="date"], .field textarea, .field select { width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--ink); padding: 0.6rem 0.7rem; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.2s; -webkit-appearance: none; appearance: none; }
  .field textarea { resize: vertical; min-height: 64px; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field-row { display: flex; gap: 0.55rem; }
  .field-row .field { flex: 1; }
  .toggle-group { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .toggle-group button { flex: 1 1 auto; min-width: 0; background: var(--bg); border: 1px solid var(--line); color: var(--ink-soft); padding: 0.45rem 0.3rem; border-radius: 6px; font-size: 0.74rem; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
  .toggle-group button.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .modal-actions { display: flex; gap: 0.55rem; margin-top: 1.1rem; }
  .btn { flex: 1; padding: 0.7rem; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid var(--line); background: var(--bg); color: var(--ink-soft); transition: all 0.15s; }
  .btn:hover { color: var(--ink); }
  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .btn.danger { color: var(--crit); border-color: rgba(217, 119, 102, 0.4); flex: 0 0 auto; padding: 0.7rem 0.9rem; }

  /* DUE-WINDOW BUCKET TABS */
  .bucket-tabs {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.35rem;
    background: var(--bg-elev);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 0.35rem;
    margin-bottom: 0.8rem;
  }
  .bucket-tab {
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-soft);
    padding: 0.5rem 0.25rem;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    transition: all 0.15s;
    min-width: 0;
  }
  .bucket-tab:hover { color: var(--ink); }
  .bucket-tab.active {
    background: var(--bg-elev-2);
    border-color: var(--accent);
    color: var(--accent);
  }
  .bucket-tab .bt-label {
    font-size: 0.62rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
    white-space: nowrap;
  }
  .bucket-tab .bt-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    line-height: 1;
  }
  .bucket-tab[data-bucket="overdue"] .bt-count { color: var(--crit); }
  .bucket-tab[data-bucket="today"] .bt-count { color: var(--warn); }
  .bucket-tab[data-bucket="overdue"].active .bt-label,
  .bucket-tab[data-bucket="overdue"].active { color: var(--crit); border-color: var(--crit); }
  .bucket-tab[data-bucket="today"].active .bt-label,
  .bucket-tab[data-bucket="today"].active { color: var(--warn); border-color: var(--warn); }

  /* SHARE BUTTONS */
  .share-btn {
    background: rgba(37, 211, 102, 0.12);
    border: 1px solid rgba(37, 211, 102, 0.35);
    color: #25d366;
    padding: 0.32rem 0.55rem;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .share-btn:hover, .share-btn:active { background: rgba(37, 211, 102, 0.22); }
  .share-btn .wa-ico {
    display: inline-block;
    width: 12px; height: 12px;

  .share-btn.compact { padding: 0.28rem 0.4rem; font-size: 0; }
  .share-btn.compact .wa-ico { width: 14px; height: 14px; }

  /* Reminders button - iOS-blue */
  .reminder-btn {
    background: rgba(0, 122, 255, 0.12);
    border: 1px solid rgba(0, 122, 255, 0.35);
    color: #4a9eff;
    padding: 0.32rem 0.55rem;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .reminder-btn:hover, .reminder-btn:active { background: rgba(0, 122, 255, 0.22); }
  .reminder-btn::before {
    content: '🔔';
    font-size: 0.85rem;
    margin-right: 0.05rem;
  }

  /* Dashboard digest button */
  .digest-share { margin-bottom: 0.9rem; }

  /* EMPTY */
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--ink-faint); font-family: 'Fraunces', serif; font-style: italic; }
  .empty .ico { font-size: 2rem; opacity: 0.3; display: block; margin-bottom: 0.4rem; }
  .empty .hint { font-size: 0.72rem; font-style: normal; margin-top: 0.4rem; }

  /* TOAST + INSTALL */
  .toast { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0) + 5.5rem); left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg); padding: 0.6rem 1.05rem; border-radius: 999px; font-size: 0.8rem; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .install { position: fixed; top: calc(env(safe-area-inset-top, 0) + 0.6rem); right: 0.9rem; background: var(--accent); color: var(--bg); padding: 0.4rem 0.8rem; border: none; border-radius: 999px; font-size: 0.7rem; font-weight: 600; cursor: pointer; display: none; z-index: 60; }
  .install.show { display: inline-block; }
  @media (display-mode: standalone) { .install { display: none !important; } }
</style>

<body>

<header class="header">
  <div class="brand">
    <h1>TRACER<span>.</span></h1>
    <div class="meta" id="dateMeta"></div>
  </div>
  <div class="search-wrap">
    <input type="text" id="globalSearch" placeholder="Search tasks, assignees, sections…" autocomplete="off" />
  </div>
  <nav class="tabs">
    <button class="tab active" data-view="dashboard">Dashboard</button>
    <button class="tab" data-view="projects">Projects</button>
    <button class="tab" data-view="assignees">By Assignee</button>
    <button class="tab" data-view="search" id="searchTab" style="display:none">Search</button>
  </nav>
</header>

<main>
  <section class="view active" id="view-dashboard">
    <div class="digest-share" style="display:flex;justify-content:flex-end;gap:0.5rem;flex-wrap:wrap;">
      <button class="reminder-btn" id="remindToday">Send today's to Reminders</button>
      <button class="share-btn" id="shareDigest"><span class="wa-ico"></span>Share daily digest</button>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="label">Open</div><div class="value" id="kpiOpen">0</div><div class="delta" id="kpiOpenDelta"></div></div>
      <div class="kpi"><div class="label">Overdue</div><div class="value crit" id="kpiOverdue">0</div><div class="delta">need attention</div></div>
      <div class="kpi"><div class="label">In Progress</div><div class="value warn" id="kpiWip">0</div><div class="delta">active right now</div></div>
      <div class="kpi"><div class="label">Completed</div><div class="value ok" id="kpiDone">0</div><div class="delta">all-time</div></div>
    </div>

    <div class="section-title"><span>Project Health</span><span style="font-family:'JetBrains Mono',monospace;font-size:0.66rem;">% complete · overdue</span></div>
    <div class="project-health" id="projectHealth"></div>

    <div class="section-title"><span>Due Window</span><span style="font-family:'JetBrains Mono',monospace;font-size:0.66rem;" id="bucketTotal"></span></div>
    <div class="bucket-tabs" id="bucketTabs">
      <button class="bucket-tab active" data-bucket="overdue"><span class="bt-label">Overdue</span><span class="bt-count" id="cnt-overdue">0</span></button>
      <button class="bucket-tab" data-bucket="today"><span class="bt-label">Today</span><span class="bt-count" id="cnt-today">0</span></button>
      <button class="bucket-tab" data-bucket="3d"><span class="bt-label">3 Days</span><span class="bt-count" id="cnt-3d">0</span></button>
      <button class="bucket-tab" data-bucket="7d"><span class="bt-label">7 Days</span><span class="bt-count" id="cnt-7d">0</span></button>
      <button class="bucket-tab" data-bucket="30d"><span class="bt-label">30 Days</span><span class="bt-count" id="cnt-30d">0</span></button>
    </div>
    <div class="task-list" id="bucketList"></div>
  </section>

  <section class="view" id="view-projects">
    <div class="project-selector" id="projectChips"></div>
    <div class="project-meta" id="projectMeta"></div>
    <div class="filters">
      <select id="filterStatus">
        <option value="open">Open</option>
        <option value="todo">Not started</option>
        <option value="wip">In progress</option>
        <option value="blocked">Blocked</option>
        <option value="done">Completed</option>
        <option value="overdue">Overdue</option>
        <option value="all">All</option>
      </select>
      <select id="filterAssignee"><option value="">All assignees</option></select>
      <select id="filterSort">
        <option value="due">Sort: Due</option>
        <option value="priority">Sort: Priority</option>
        <option value="section">Sort: Section</option>
        <option value="created">Sort: Newest</option>
      </select>
    </div>
    <div style="display:flex;gap:0.5rem;margin-bottom:0.9rem;flex-wrap:wrap;align-items:center;">
      <button class="share-btn" id="shareFiltered"><span class="wa-ico"></span>Share this list</button>
      <button class="share-btn" id="shareProjectSummary"><span class="wa-ico"></span>Share project summary</button>
      <button class="project-edit-link" id="editProjectLink">Rename / Delete</button>
    </div>
    <div class="task-list" id="taskList"></div>
  </section>

  <section class="view" id="view-assignees">
    <div class="filters" style="margin-bottom:0.7rem;">
      <select id="assigneeStatus">
        <option value="open">Open</option>
        <option value="overdue">Overdue only</option>
        <option value="wip">In progress</option>
        <option value="all">All</option>
      </select>
    </div>
    <div id="assigneeList"></div>
  </section>

  <section class="view" id="view-search">
    <div class="section-title"><span>Search results</span><span id="searchCount" style="font-family:'JetBrains Mono',monospace;font-size:0.66rem;"></span></div>
    <div class="task-list" id="searchList"></div>
  </section>
</main>

<button class="fab" id="addBtn" aria-label="Add task">+</button>
<button class="install" id="installBtn">Install</button>
<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="taskModal">
  <div class="modal">
    <div class="modal-head"><h2 id="modalTitle">New Task</h2><button class="modal-close" id="modalClose">×</button></div>
    <div class="field"><label>Task</label><input type="text" id="fTitle" placeholder="What needs doing?" autocomplete="off" /></div>
    <div class="field-row">
      <div class="field"><label>Project</label><select id="fProject"></select></div>
      <div class="field"><label>Section</label><input type="text" id="fSection" placeholder="e.g. Finance" autocomplete="off" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Assignee</label><select id="fAssignee"></select></div>
      <div class="field"><label>Due Date</label><input type="date" id="fDue" /></div>
    </div>
    <div class="field">
      <label>Status</label>
      <div class="toggle-group" id="fStatus">
        <button data-s="todo">Not started</button>
        <button data-s="wip">In progress</button>
        <button data-s="blocked">Blocked</button>
        <button data-s="done">Done</button>
      </div>
    </div>
    <div class="field">
      <label>Priority</label>
      <div class="toggle-group" id="fPriority">
        <button data-p="crit">Critical</button>
        <button data-p="high">High</button>
        <button data-p="med">Medium</button>
        <button data-p="low">Low</button>
      </div>
    </div>
    <div class="field"><label>Latest Update / Notes</label><textarea id="fNotes" placeholder="Last status update, blockers, context…"></textarea></div>
    <div style="display:flex;justify-content:flex-end;gap:0.4rem;margin-top:0.5rem;flex-wrap:wrap;">
      <button class="reminder-btn" id="remindTask" style="display:none;">Send to Reminders</button>
      <button class="share-btn" id="shareTask" style="display:none;"><span class="wa-ico"></span>Share this task</button>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="btnDelete" style="display:none;">Delete</button>
      <button class="btn" id="btnCancel">Cancel</button>
      <button class="btn primary" id="btnSave">Save</button>
    </div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-backdrop" id="projectModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="projectModalTitle">New Project</h2>
      <button class="modal-close" id="projectModalClose">×</button>
    </div>
    <div class="field">
      <label>Project Name</label>
      <input type="text" id="fProjectName" placeholder="e.g. MIDC Pune Phase 2" autocomplete="off" />
    </div>
    <div class="field" id="projectStatsField" style="display:none;">
      <label>Stats</label>
      <div style="font-size:0.78rem;color:var(--ink-soft);line-height:1.5;" id="projectStatsText"></div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="projectDeleteBtn" style="display:none;">Delete</button>
      <button class="btn" id="projectCancelBtn">Cancel</button>
      <button class="btn primary" id="projectSaveBtn">Save</button>
    </div>
  </div>
</div>

<script>
/* ========================================================================
   TRACER v2 — extended schema (4 statuses, 4 priorities, sections, updates)
   Seeded from your 247 actual tasks across 11 projects
   ======================================================================== */

const STORAGE_KEY = 'tracer.data.v2';
const SEED_VERSION_KEY = 'tracer.seedVersion';
const CURRENT_SEED_VERSION = '2026-05-13-247';

const SEED = JSON.parse(document.getElementById('seedData').textContent);

const STATUS_LABELS = { todo: 'Not started', wip: 'In progress', blocked: 'Blocked', done: 'Done' };
const PRIO_LABELS  = { crit: 'Critical', high: 'High', med: 'Medium', low: 'Low' };
const PRIO_ORDER   = { crit: 0, high: 1, med: 2, low: 3 };

/* ===== STATE ===== */
let state = {
  tasks: [],
  projects: SEED.projects.slice(),
  assignees: SEED.assignees.slice(),
  currentProjectId: SEED.projects[0]?.id || 'mes',
  editingId: null,
  searchQuery: ''
};

function loadOrSeed() {
  const savedVersion = localStorage.getItem(SEED_VERSION_KEY);
  const raw = localStorage.getItem(STORAGE_KEY);

  if (raw && savedVersion === CURRENT_SEED_VERSION) {
    try {
      const parsed = JSON.parse(raw);
      if (parsed.tasks) state.tasks = parsed.tasks;
      if (parsed.currentProjectId) state.currentProjectId = parsed.currentProjectId;
      return;
    } catch (e) { console.warn('Load failed, re-seeding', e); }
  }

  // First load OR seed updated — seed from embedded data
  // Generate stable createdAt timestamps spread across recent past so sort order is sensible
  const now = Date.now();
  state.tasks = SEED.tasks.map((t, i) => ({
    ...t,
    created: now - (SEED.tasks.length - i) * 60000  // 1 min apart, oldest first
  }));
  localStorage.setItem(SEED_VERSION_KEY, CURRENT_SEED_VERSION);
  save();
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tasks: state.tasks, currentProjectId: state.currentProjectId
    }));
  } catch (e) { console.warn('Save failed', e); }
}

/* ===== UTILITIES ===== */
function uid() { return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - today()) / 86400000);
}

function dueLabel(dateStr) {
  if (!dateStr) return '';
  const diff = daysUntil(dateStr);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return '1d overdue';
  if (diff < 0) return `${Math.abs(diff)}d overdue`;
  if (diff < 7) return `in ${diff}d`;
  const d = new Date(dateStr);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function dueClass(dateStr, done) {
  if (done || !dateStr) return '';
  const diff = daysUntil(dateStr);
  if (diff < 0) return 'overdue';
  if (diff <= 2) return 'soon';
  return '';
}

function initials(name) {
  return name.split(/[\s&\/]+/).filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function getProject(id) { return state.projects.find(p => p.id === id); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function isOpen(t) { return t.status !== 'done'; }
function isOverdue(t) { return isOpen(t) && t.due && daysUntil(t.due) < 0; }

/* ===== WHATSAPP SHARE ===== */

function shareToWhatsApp(text) {
  const url = 'https://wa.me/?text=' + encodeURIComponent(text);
  window.open(url, '_blank');
}

/* ===== iOS REMINDERS (via native Share Sheet) ===== */

async function sendToReminders(title, due, notes) {
  // Use native share sheet on iOS — Reminders is one of the targets.
  // The user taps "Reminders" in the sheet, and iOS pre-fills the title/notes.
  // iOS doesn't accept structured due dates via Web Share, so we put the date in the title.
  let shareTitle = title;
  if (due) {
    const d = new Date(due);
    const diff = daysUntil(due);
    let dateLabel = '';
    if (diff === 0) dateLabel = 'today';
    else if (diff === 1) dateLabel = 'tomorrow';
    else if (diff > 0) dateLabel = `in ${diff}d (${d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })})`;
    else dateLabel = `${Math.abs(diff)}d overdue`;
    shareTitle = `${title} — due ${dateLabel}`;
  }

  if (navigator.share) {
    try {
      await navigator.share({
        title: shareTitle,
        text: notes || shareTitle,
      });
      return true;
    } catch (err) {
      // User cancelled or share failed - silent
      if (err.name !== 'AbortError') console.warn('Share failed:', err);
      return false;
    }
  } else {
    // Fallback: copy to clipboard
    const txt = notes ? `${shareTitle}\n${notes}` : shareTitle;
    try {
      await navigator.clipboard.writeText(txt);
      toast('Copied — paste into Reminders app');
      return true;
    } catch (err) {
      toast('Could not share. Try again.');
      return false;
    }
  }
}

// Bulk: send today's tasks to Reminders as one summary
async function sendTodayToReminders() {
  const open = state.tasks.filter(isOpen);
  const todayAndOverdue = open.filter(t => t.due && daysUntil(t.due) <= 0);
  if (todayAndOverdue.length === 0) {
    toast('Nothing due today or overdue 👍');
    return;
  }
  const lines = todayAndOverdue
    .sort((a, b) => a.due.localeCompare(b.due))
    .map(t => {
      const proj = getProject(t.projectId);
      const due = daysUntil(t.due);
      const dueLbl = due === 0 ? 'today' : `${Math.abs(due)}d late`;
      return `• ${t.title} (${proj?.name || ''} · ${dueLbl}${t.assignee ? ' · ' + t.assignee : ''})`;
    });
  const title = `TRACER · Today's tasks (${todayAndOverdue.length})`;
  const notes = lines.join('\n');
  sendToReminders(title, null, notes);
}

function dateHeader() {
  const d = new Date();
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}

function fmtDue(dateStr) {
  if (!dateStr) return '';
  const diff = daysUntil(dateStr);
  if (diff < 0) return `${Math.abs(diff)}d late`;
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff < 7) return `in ${diff}d`;
  const d = new Date(dateStr);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function prioEmoji(p) {
  return { crit: '🔴', high: '🟠', med: '🟡', low: '🟢' }[p] || '⚪';
}

function statusEmoji(s) {
  return { todo: '⚪', wip: '🟡', blocked: '🔵', done: '✅' }[s] || '⚪';
}

// 1. Single task
function buildTaskMessage(t) {
  const proj = getProject(t.projectId);
  const lines = [`📌 *${t.title}*`, ''];
  if (proj) lines.push(`📍 ${proj.name}${t.section ? ' · ' + t.section : ''}`);
  if (t.assignee) lines.push(`👤 ${t.assignee}`);
  lines.push(`${prioEmoji(t.priority)} *${PRIO_LABELS[t.priority] || t.priority} priority*`);
  if (t.due) lines.push(`📅 Due ${fmtDue(t.due)} (${t.due})`);
  lines.push(`${statusEmoji(t.status)} ${STATUS_LABELS[t.status] || t.status}`);
  if (t.notes) {
    lines.push('');
    lines.push(`💬 _Last update:_ ${t.notes}`);
  }
  lines.push('');
  lines.push('_via TRACER_');
  return lines.join('\n');
}

// 2. Per-assignee
function buildAssigneeMessage(name) {
  const open = state.tasks.filter(t => isOpen(t) && t.assignee === name);
  const overdue = open.filter(t => t.due && daysUntil(t.due) < 0);
  const dueWeek = open.filter(t => t.due && daysUntil(t.due) >= 0 && daysUntil(t.due) <= 7);
  const wip = open.filter(t => t.status === 'wip' && !overdue.includes(t) && !dueWeek.includes(t));
  const other = open.filter(t => !overdue.includes(t) && !dueWeek.includes(t) && !wip.includes(t));

  const lines = [`📋 *Tasks for ${name}*`, `📅 As of ${dateHeader()}`, ''];

  const renderGroup = (emoji, label, items) => {
    if (items.length === 0) return;
    lines.push(`${emoji} *${label} (${items.length})*`);
    items.forEach(t => {
      const proj = getProject(t.projectId);
      lines.push(`• ${t.title}`);
      const meta = [];
      if (proj) meta.push(proj.name);
      if (t.section) meta.push(t.section);
      if (t.due) meta.push(fmtDue(t.due));
      if (meta.length) lines.push(`  📍 ${meta.join(' · ')}`);
    });
    lines.push('');
  };

  renderGroup('🔴', 'OVERDUE', overdue);
  renderGroup('🟡', 'DUE THIS WEEK', dueWeek);
  renderGroup('🟢', 'IN PROGRESS', wip);
  renderGroup('⚪', 'OTHER OPEN', other);

  if (open.length === 0) {
    lines.push('✅ No open tasks. All clear!');
    lines.push('');
  }

  lines.push('_via TRACER_');
  return lines.join('\n');
}

// 3. Filtered list (current Projects view) — uses what's visible
function buildFilteredListMessage() {
  const proj = getProject(state.currentProjectId);
  const statusFilter = document.getElementById('filterStatus').value;
  const assigneeFilter = document.getElementById('filterAssignee').value;

  let tasks = state.tasks.filter(t => t.projectId === state.currentProjectId);
  if (statusFilter === 'open') tasks = tasks.filter(isOpen);
  else if (statusFilter === 'overdue') tasks = tasks.filter(isOverdue);
  else if (statusFilter !== 'all') tasks = tasks.filter(t => t.status === statusFilter);
  if (assigneeFilter) tasks = tasks.filter(t => t.assignee === assigneeFilter);

  // Sort by due then priority
  tasks.sort((a, b) => {
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1; if (b.due) return 1;
    return (PRIO_ORDER[a.priority] ?? 2) - (PRIO_ORDER[b.priority] ?? 2);
  });

  const statusLabel = {
    open: 'Open tasks', todo: 'Not started', wip: 'In progress',
    blocked: 'Blocked', done: 'Completed', overdue: 'Overdue', all: 'All tasks'
  }[statusFilter] || 'Tasks';

  const lines = [
    `📋 *${proj?.name || 'Tasks'} — ${statusLabel}*`,
    `📅 ${dateHeader()} · ${tasks.length} item${tasks.length !== 1 ? 's' : ''}`,
    ''
  ];
  if (assigneeFilter) lines.splice(1, 0, `👤 ${assigneeFilter}`);

  if (tasks.length === 0) {
    lines.push('_No tasks match._');
  } else {
    // Cap at 25 to keep WhatsApp message manageable
    const show = tasks.slice(0, 25);
    show.forEach(t => {
      const meta = [];
      if (t.assignee) meta.push(t.assignee);
      if (t.due) meta.push(fmtDue(t.due));
      lines.push(`${prioEmoji(t.priority)} ${t.title}`);
      if (meta.length) lines.push(`   ${meta.join(' · ')}`);
    });
    if (tasks.length > 25) lines.push(`... +${tasks.length - 25} more`);
  }
  lines.push('');
  lines.push('_via TRACER_');
  return lines.join('\n');
}

// 4. Project summary
function buildProjectSummary(projectId) {
  const proj = getProject(projectId);
  if (!proj) return '';
  const tasks = state.tasks.filter(t => t.projectId === projectId);
  const done = tasks.filter(t => t.status === 'done').length;
  const wip = tasks.filter(t => t.status === 'wip').length;
  const todo = tasks.filter(t => t.status === 'todo').length;
  const blocked = tasks.filter(t => t.status === 'blocked').length;
  const overdue = tasks.filter(isOverdue);
  const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;

  const lines = [
    `🏗️ *${proj.name}*`,
    `📅 ${dateHeader()}`,
    '',
    `📊 Progress: ${pct}% complete`,
    `✅ Done: ${done} / ${tasks.length}`,
    `🟡 In progress: ${wip}`,
  ];
  if (overdue.length) lines.push(`🔴 *Overdue: ${overdue.length}*`);
  lines.push(`⚪ Not started: ${todo}`);
  if (blocked) lines.push(`🔵 Blocked: ${blocked}`);

  if (overdue.length) {
    lines.push('');
    lines.push('⚠️ *Top overdue items:*');
    overdue
      .sort((a, b) => a.due.localeCompare(b.due))
      .slice(0, 5)
      .forEach(t => lines.push(`• ${t.title} · ${fmtDue(t.due)}${t.assignee ? ' · ' + t.assignee : ''}`));
  }

  lines.push('');
  lines.push('_via TRACER_');
  return lines.join('\n');
}

// 5. Daily digest
function buildDailyDigest() {
  const tasks = state.tasks;
  const open = tasks.filter(isOpen);
  const overdue = open.filter(t => t.due && daysUntil(t.due) < 0);
  const today = open.filter(t => t.due && daysUntil(t.due) === 0);
  const in3 = open.filter(t => t.due && daysUntil(t.due) >= 1 && daysUntil(t.due) <= 3);
  const in7 = open.filter(t => t.due && daysUntil(t.due) >= 1 && daysUntil(t.due) <= 7);
  const wip = tasks.filter(t => t.status === 'wip').length;
  const done = tasks.filter(t => t.status === 'done').length;
  const active = state.projects.filter(p => tasks.some(t => t.projectId === p.id));

  const lines = [
    `🌅 *TRACER Daily Digest*`,
    `📅 ${dateHeader()}`,
    '',
    `📊 *Overall*`,
    `• ${open.length} open across ${active.length} projects`,
    `• ${wip} in progress`,
    `• ${done} completed`,
    '',
    `⏰ *Due Windows*`,
    `🔴 Overdue: ${overdue.length}`,
    `🟠 Today: ${today.length}`,
    `🟡 Next 3 days: ${in3.length}`,
    `🟢 Next 7 days: ${in7.length}`,
  ];

  // Projects with most overdue
  const byOverdue = active
    .map(p => ({ p, n: tasks.filter(t => t.projectId === p.id && isOverdue(t)).length }))
    .filter(x => x.n > 0)
    .sort((a, b) => b.n - a.n)
    .slice(0, 5);

  if (byOverdue.length) {
    lines.push('');
    lines.push('🏗️ *Projects needing attention*');
    byOverdue.forEach(({ p, n }) => lines.push(`• ${p.name} — ${n} overdue`));
  }

  lines.push('');
  lines.push('_via TRACER_');
  return lines.join('\n');
}

function renderDashboard() {
  const tasks = state.tasks;
  const open = tasks.filter(isOpen);

  const wip = tasks.filter(t => t.status === 'wip');
  const done = tasks.filter(t => t.status === 'done');

  document.getElementById('kpiOpen').textContent = open.length;
  document.getElementById('kpiOverdue').textContent = overdue.length;
  document.getElementById('kpiWip').textContent = wip.length;
  document.getElementById('kpiDone').textContent = done.length;

  const active = state.projects.filter(p => tasks.some(t => t.projectId === p.id));
  document.getElementById('kpiOpenDelta').textContent = `${active.length} active project${active.length !== 1 ? 's' : ''}`;

  // Project health
  const container = document.getElementById('projectHealth');
  container.innerHTML = '';
  if (active.length === 0) {
    container.innerHTML = `<div class="empty"><span class="ico">·</span>No projects active yet.<div class="hint">Tap + to add a task</div></div>`;
  } else {
    // Sort by overdue desc, then by open task count
    const sorted = active.map(p => {
      const pt = tasks.filter(t => t.projectId === p.id);
      const pDone = pt.filter(t => t.status === 'done').length;
      const pOverdue = pt.filter(isOverdue).length;
      const pOpen = pt.filter(isOpen).length;
      return { p, pt, pDone, pOverdue, pOpen, pct: pt.length ? Math.round(pDone/pt.length*100) : 0 };
    }).sort((a, b) => b.pOverdue - a.pOverdue || b.pOpen - a.pOpen);

    sorted.forEach(({ p, pDone, pOverdue, pct }) => {
      const row = document.createElement('div');
      row.className = 'ph-row';
      row.innerHTML = `
        <div class="ph-name">${escapeHTML(p.name)}</div>
        <div class="ph-bar"><div class="ph-bar-fill" style="width:${pct}%"></div></div>
        <div class="ph-count">${pct}%${pOverdue ? ` <span class="overdue">·${pOverdue}!</span>` : ''}</div>
      `;
      row.onclick = () => { state.currentProjectId = p.id; save(); switchView('projects'); };
      container.appendChild(row);
    });
  }

  // Due-window buckets
  renderBuckets();
}

let currentBucket = 'overdue';

function renderBuckets() {
  const open = state.tasks.filter(isOpen);

  // Buckets are inclusive of earlier ones up to their cap, but for display
  // each tab shows ONLY its window (overdue / today / due-within-3 / -7 / -30)
  const buckets = {
    overdue: open.filter(t => t.due && daysUntil(t.due) < 0),
    today:   open.filter(t => t.due && daysUntil(t.due) === 0),
    '3d':    open.filter(t => t.due && daysUntil(t.due) >= 1 && daysUntil(t.due) <= 3),
    '7d':    open.filter(t => t.due && daysUntil(t.due) >= 1 && daysUntil(t.due) <= 7),
    '30d':   open.filter(t => t.due && daysUntil(t.due) >= 1 && daysUntil(t.due) <= 30)
  };

  // Update counts on tabs
  document.getElementById('cnt-overdue').textContent = buckets.overdue.length;
  document.getElementById('cnt-today').textContent   = buckets.today.length;
  document.getElementById('cnt-3d').textContent      = buckets['3d'].length;
  document.getElementById('cnt-7d').textContent      = buckets['7d'].length;
  document.getElementById('cnt-30d').textContent     = buckets['30d'].length;

  // Visual active state
  document.querySelectorAll('.bucket-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.bucket === currentBucket)
  );

  const list = document.getElementById('bucketList');
  list.innerHTML = '';
  const items = buckets[currentBucket] || [];
  document.getElementById('bucketTotal').textContent = items.length ? `${items.length} task${items.length !== 1 ? 's' : ''}` : '';

  if (items.length === 0) {
    const msgs = {
      overdue: 'Nothing overdue.',
      today:   'Nothing due today.',
      '3d':    'Nothing due in the next 3 days.',
      '7d':    'Nothing due in the next 7 days.',
      '30d':   'Nothing due in the next 30 days.'
    };
    list.innerHTML = `<div class="empty"><span class="ico">✓</span>${msgs[currentBucket]}</div>`;
    return;
  }

  // Sort: nearest due first, then priority
  items.sort((a, b) => {
    const dc = a.due.localeCompare(b.due);
    if (dc !== 0) return dc;
    return (PRIO_ORDER[a.priority] ?? 2) - (PRIO_ORDER[b.priority] ?? 2);
  });

  items.forEach(t => list.appendChild(taskCard(t, { showProject: true })));
}

function renderTaskList() {
  const statusFilter = document.getElementById('filterStatus').value;
  const assigneeFilter = document.getElementById('filterAssignee').value;
  const sort = document.getElementById('filterSort').value;

  let tasks = state.tasks.filter(t => t.projectId === state.currentProjectId);

  if (statusFilter === 'open') tasks = tasks.filter(isOpen);
  else if (statusFilter === 'overdue') tasks = tasks.filter(isOverdue);
  else if (statusFilter !== 'all') tasks = tasks.filter(t => t.status === statusFilter);

  if (assigneeFilter) tasks = tasks.filter(t => t.assignee === assigneeFilter);

  const list = document.getElementById('taskList');
  list.innerHTML = '';
  if (tasks.length === 0) {
    list.innerHTML = `<div class="empty"><span class="ico">·</span>No tasks match these filters.</div>`;
    return;
  }

  if (sort === 'section') {
    // Group by section
    const groups = {};
    tasks.forEach(t => {
      const k = t.section || '— Other —';
      if (!groups[k]) groups[k] = [];
      groups[k].push(t);
    });
    Object.keys(groups).sort((a, b) => a.localeCompare(b)).forEach(sec => {
      const hdr = document.createElement('div');
      hdr.className = 'section-divider';
      hdr.innerHTML = `<span>${escapeHTML(sec)}</span><span class="count">${groups[sec].length}</span>`;
      list.appendChild(hdr);
      sortTasks(groups[sec], 'due').forEach(t => list.appendChild(taskCard(t)));
    });
  } else {
    sortTasks(tasks, sort).forEach(t => list.appendChild(taskCard(t)));
  }
}

function sortTasks(tasks, sort) {
  return tasks.slice().sort((a, b) => {
    const aDone = a.status === 'done', bDone = b.status === 'done';
    if (aDone !== bDone) return aDone ? 1 : -1;
    if (sort === 'due') {
      if (!a.due && !b.due) return b.created - a.created;
      if (!a.due) return 1;
      if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    }
    if (sort === 'priority') {
      const p = (PRIO_ORDER[a.priority] ?? 2) - (PRIO_ORDER[b.priority] ?? 2);
      if (p !== 0) return p;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      return b.created - a.created;
    }
    return b.created - a.created;
  });
}

/* ===== TASK CARD ===== */
function escapeHTML(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function taskCard(t, opts = {}) {
  const dc = dueClass(t.due, t.status === 'done');
  const card = document.createElement('div');
  let cls = 'task';
  if (dc === 'overdue') cls += ' overdue';
  else if (dc === 'soon') cls += ' due-soon';
  else if (t.status === 'blocked') cls += ' blocked';
  card.className = cls;

  // Check button
  const check = document.createElement('button');
  let checkCls = 'check';
  if (t.status === 'done') checkCls += ' done';
  else if (t.status === 'wip') checkCls += ' wip';
  else if (t.status === 'blocked') checkCls += ' blocked';
  check.className = checkCls;
  check.setAttribute('aria-label', 'Cycle status');
  check.onclick = (e) => { e.stopPropagation(); cycleStatus(t.id); };

  const body = document.createElement('div');
  body.className = 'task-body';
  body.onclick = () => openTaskModal(t);

  const title = document.createElement('div');
  title.className = 'task-title' + (t.status === 'done' ? ' done' : '');
  title.textContent = t.title;

  const meta = document.createElement('div');
  meta.className = 'task-meta';
  const proj = getProject(t.projectId);
  let metaHTML = '';
  if (t.priority) metaHTML += `<span class="tag"><span class="priority-dot ${t.priority}"></span>${PRIO_LABELS[t.priority] || t.priority}</span>`;
  if (t.status === 'wip') metaHTML += `<span class="stat-tag wip">WIP</span>`;
  else if (t.status === 'blocked') metaHTML += `<span class="stat-tag blocked">BLOCKED</span>`;
  if (t.assignee) metaHTML += `<span class="tag">${escapeHTML(t.assignee)}</span>`;
  if (t.due) metaHTML += `<span class="due ${dc}">${dueLabel(t.due)}</span>`;
  if (t.section && !opts.showProject) metaHTML += `<span class="tag" style="opacity:0.6;">${escapeHTML(t.section)}</span>`;
  if (opts.showProject && proj) metaHTML += `<span class="tag" style="opacity:0.7;">${escapeHTML(proj.name)}</span>`;
  meta.innerHTML = metaHTML;

  body.appendChild(title);
  body.appendChild(meta);

  // Update note
  if (t.notes && t.status !== 'done') {
    const upd = document.createElement('div');
    upd.className = 'task-update';
    let updHTML = '';
    if (t.updateDate) updHTML += `<span class="upd-date">${escapeHTML(t.updateDate)}</span>`;
    updHTML += escapeHTML(t.notes);
    upd.innerHTML = updHTML;
    body.appendChild(upd);
  }

  const menuBtn = document.createElement('button');
  menuBtn.className = 'task-menu-btn';
  menuBtn.innerHTML = '⋯';
  menuBtn.setAttribute('aria-label', 'Edit task');
  menuBtn.onclick = (e) => { e.stopPropagation(); openTaskModal(t); };

  card.appendChild(check);
  card.appendChild(body);
  card.appendChild(menuBtn);
  return card;
}

/* ===== STATUS CYCLE ===== */
function cycleStatus(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  // todo -> wip -> done -> todo (Blocked is set via modal only)
  if (t.status === 'todo' || t.status === 'blocked') t.status = 'wip';
  else if (t.status === 'wip') { t.status = 'done'; t.completedAt = new Date().toISOString(); }
  else if (t.status === 'done') { t.status = 'todo'; t.completedAt = null; }
  save();
  rerender();
  toast(`Set to ${STATUS_LABELS[t.status]}`);
}

/* ===== ASSIGNEES VIEW ===== */
const collapsedAssignees = new Set();

function renderAssignees() {
  const f = document.getElementById('assigneeStatus').value;
  const cont = document.getElementById('assigneeList');
  cont.innerHTML = '';

  let tasks = state.tasks;
  if (f === 'open') tasks = tasks.filter(isOpen);
  else if (f === 'overdue') tasks = tasks.filter(isOverdue);
  else if (f === 'wip') tasks = tasks.filter(t => t.status === 'wip');

  const groups = {};
  tasks.forEach(t => {
    const a = t.assignee || 'Unassigned';
    if (!groups[a]) groups[a] = [];
    groups[a].push(t);
  });

  const ordered = Object.keys(groups).sort((a, b) => {
    const aO = groups[a].filter(isOverdue).length;
    const bO = groups[b].filter(isOverdue).length;
    if (aO !== bO) return bO - aO;
    return groups[b].filter(isOpen).length - groups[a].filter(isOpen).length;
  });

  if (ordered.length === 0) {
    cont.innerHTML = `<div class="empty"><span class="ico">·</span>No tasks to show.</div>`;
    return;
  }

  ordered.forEach(name => {
    const group = document.createElement('div');
    group.className = 'assignee-group' + (collapsedAssignees.has(name) ? ' collapsed' : '');
    const overdueN = groups[name].filter(isOverdue).length;
    const wipN = groups[name].filter(t => t.status === 'wip').length;
    const openN = groups[name].filter(isOpen).length;

    const head = document.createElement('div');
    head.className = 'assignee-head';
    head.innerHTML = `
      <div class="assignee-name"><div class="avatar">${initials(name)}</div>${escapeHTML(name)}</div>
      <div class="assignee-counts">
        ${overdueN ? `<span class="badge crit">${overdueN} late</span>` : ''}
        ${wipN ? `<span class="badge warn">${wipN} WIP</span>` : ''}
        <span class="badge">${openN} open</span>
        <button class="share-btn compact" data-share-assignee="${escapeHTML(name)}" aria-label="Share via WhatsApp"><span class="wa-ico"></span></button>
        <span class="chevron">▾</span>
      </div>
    `;
    // Wire the share button to stop event propagation (so it doesn't collapse the group)
    const shareBtn = head.querySelector('[data-share-assignee]');
    shareBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      shareToWhatsApp(buildAssigneeMessage(name));
    });
    head.onclick = (e) => {
      // Don't toggle if the share button was clicked
      if (e.target.closest('[data-share-assignee]')) return;
      if (collapsedAssignees.has(name)) collapsedAssignees.delete(name);
      else collapsedAssignees.add(name);
      renderAssignees();
    };

    const body = document.createElement('div');
    body.className = 'assignee-body';
    sortTasks(groups[name], 'due').forEach(t => body.appendChild(taskCard(t, { showProject: true })));

    group.appendChild(head);
    group.appendChild(body);
    cont.appendChild(group);
  });
}

document.getElementById('addBtn').onclick = () => openTaskModal();
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('btnCancel').onclick = closeModal;
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

document.getElementById('btnSave').onclick = () => {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('Task title is required'); return; }
  const data = {
    title,
    projectId: document.getElementById('fProject').value,
    section: document.getElementById('fSection').value.trim() || null,
    assignee: document.getElementById('fAssignee').value || null,
    due: document.getElementById('fDue').value || null,
    priority: selectedPriority,
    status: selectedStatus,
    notes: document.getElementById('fNotes').value.trim() || null
  };
  if (state.editingId) {
    const t = state.tasks.find(x => x.id === state.editingId);
    Object.assign(t, data);
    if (data.status === 'done' && !t.completedAt) t.completedAt = new Date().toISOString();
    else if (data.status !== 'done') t.completedAt = null;
    toast('Task updated');
  } else {
    // Auto-add new assignee to roster
    if (data.assignee && !state.assignees.includes(data.assignee)) {
      state.assignees.push(data.assignee);
      state.assignees.sort();
    }
    state.tasks.push({
      id: uid(), ...data,
      completedAt: data.status === 'done' ? new Date().toISOString() : null,
      created: Date.now()
    });
    toast('Task added');
  }
  save();
  rerender();
  closeModal();
};

document.getElementById('btnDelete').onclick = () => {
  if (!state.editingId) return;
  if (confirm('Delete this task?')) {
    state.tasks = state.tasks.filter(t => t.id !== state.editingId);
    save(); rerender(); closeModal(); toast('Task deleted');
  }
};

function rerender() {
  const active = document.querySelector('.tab.active').dataset.view;
  if (active === 'dashboard') renderDashboard();
  if (active === 'projects') renderProjects();
  if (active === 'assignees') renderAssignees();
  if (active === 'search') renderSearch();
}

/* ===== PROJECT MANAGEMENT ===== */
let editingProjectId = null;

function makeProjectId(name) {
  // Slug from name, uniqueness-checked
  let base = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 24) || 'p';
  let id = base;
  let n = 2;
  while (state.projects.some(p => p.id === id)) {
    id = `${base}-${n++}`;
  }
  return id;
}

function openProjectModal(projectId = null) {
  editingProjectId = projectId;
  const modal = document.getElementById('projectModal');
  const isEdit = !!projectId;
  document.getElementById('projectModalTitle').textContent = isEdit ? 'Edit Project' : 'New Project';
  document.getElementById('projectDeleteBtn').style.display = isEdit ? 'block' : 'none';
  const statsField = document.getElementById('projectStatsField');

  if (isEdit) {
    const p = getProject(projectId);
    document.getElementById('fProjectName').value = p.name;
    const tasks = state.tasks.filter(t => t.projectId === projectId);
    const open = tasks.filter(isOpen).length;
    const done = tasks.filter(t => t.status === 'done').length;
    statsField.style.display = 'block';
    document.getElementById('projectStatsText').innerHTML =
      `${tasks.length} task${tasks.length !== 1 ? 's' : ''} · ${open} open · ${done} completed`;
  } else {
    document.getElementById('fProjectName').value = '';
    statsField.style.display = 'none';
  }
  modal.classList.add('show');
  setTimeout(() => document.getElementById('fProjectName').focus(), 100);
}

function closeProjectModal() {
  document.getElementById('projectModal').classList.remove('show');
  editingProjectId = null;
}

document.getElementById('projectModalClose').onclick = closeProjectModal;
document.getElementById('projectCancelBtn').onclick = closeProjectModal;
document.getElementById('projectModal').addEventListener('click', e => {
  if (e.target.id === 'projectModal') closeProjectModal();
});

document.getElementById('projectSaveBtn').onclick = () => {
  const name = document.getElementById('fProjectName').value.trim();
  if (!name) { toast('Project name required'); return; }
  if (editingProjectId) {
    const p = getProject(editingProjectId);
    p.name = name;
    toast('Project renamed');
  } else {
    const id = makeProjectId(name);
    state.projects.push({ id, name });
    state.currentProjectId = id;
    toast('Project added');
  }
  save();
  rerender();
  closeProjectModal();
};

document.getElementById('projectDeleteBtn').onclick = () => {
  if (!editingProjectId) return;
  const p = getProject(editingProjectId);
  const taskCount = state.tasks.filter(t => t.projectId === editingProjectId).length;
  let msg = `Delete project "${p.name}"?`;
  if (taskCount > 0) msg += `\n\nThis will also delete ${taskCount} task${taskCount !== 1 ? 's' : ''}. This cannot be undone.`;
  if (!confirm(msg)) return;
  state.tasks = state.tasks.filter(t => t.projectId !== editingProjectId);
  state.projects = state.projects.filter(p => p.id !== editingProjectId);
  if (state.currentProjectId === editingProjectId) {
    state.currentProjectId = state.projects[0]?.id || null;
  }
  save();
  rerender();
  closeProjectModal();
  toast('Project deleted');
};

document.getElementById('editProjectLink').onclick = () => {
  if (state.currentProjectId) openProjectModal(state.currentProjectId);
};

/* ===== SHARE BUTTON WIRING ===== */
document.getElementById('shareDigest').onclick = () => shareToWhatsApp(buildDailyDigest());
document.getElementById('shareFiltered').onclick = () => shareToWhatsApp(buildFilteredListMessage());
document.getElementById('shareProjectSummary').onclick = () => shareToWhatsApp(buildProjectSummary(state.currentProjectId));
document.getElementById('shareTask').onclick = () => {
  if (!state.editingId) return;
  const t = state.tasks.find(x => x.id === state.editingId);
  if (t) shareToWhatsApp(buildTaskMessage(t));
};

/* ===== REMINDER BUTTON WIRING ===== */
document.getElementById('remindToday').onclick = () => sendTodayToReminders();
document.getElementById('remindTask').onclick = () => {
  if (!state.editingId) return;
  const t = state.tasks.find(x => x.id === state.editingId);
  if (!t) return;
  const proj = getProject(t.projectId);
  const notesParts = [];
  if (proj) notesParts.push(`Project: ${proj.name}`);
  if (t.section) notesParts.push(`Section: ${t.section}`);
  if (t.assignee) notesParts.push(`Assignee: ${t.assignee}`);
  if (t.priority) notesParts.push(`Priority: ${PRIO_LABELS[t.priority] || t.priority}`);
  if (t.notes) notesParts.push(`\n${t.notes}`);
  sendToReminders(t.title, t.due, notesParts.join('\n'));
};

/* ===== INIT ===== */
loadOrSeed();
setDateMeta();
renderDashboard();

/* ===== SW + INSTALL ===== */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW reg failed:', err));
  });
}
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e;
  if (localStorage.getItem('tracer.install.dismissed') !== '1') installBtn.classList.add('show');
});
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) { installBtn.classList.remove('show'); return; }
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null; installBtn.classList.remove('show');
  if (outcome === 'dismissed') localStorage.setItem('tracer.install.dismissed', '1');
});
window.addEventListener('appinstalled', () => { installBtn.classList.remove('show'); deferredPrompt = null; });
</script>
